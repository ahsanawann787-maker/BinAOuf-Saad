services:
  mongo:
    image: mongo:7
    container_name: binaouf-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Expose only if you need a GUI like Compass on the host:
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: binaouf-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017/binaouf
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads

volumes:
  mongo_data:
  uploads_data:
